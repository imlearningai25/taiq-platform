<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Insights — TaIQ Career Blog</title>
  <meta name="description" content="Expert career advice, industry trends, and hiring guides from the TaIQ team."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--ink:#0a0f1e;--ink-2:#1c2338;--ink-3:#384060;--steel:#6b7899;--mist:#c8d0e4;--paper:#f4f6fb;--white:#fff;--brand:#0052cc;--brand-2:#0040a0;--accent:#ff5c35;--success:#22c55e;--r1:.5rem;--r2:1rem;--r3:1.5rem;--r-full:9999px;--shadow-sm:0 1px 4px rgba(10,15,30,.08);--shadow-md:0 4px 20px rgba(10,15,30,.12);--trans:.25s cubic-bezier(.4,0,.2,1)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;color:var(--ink);background:var(--paper);min-height:100vh}
    a{color:var(--brand);text-decoration:none}
    img{max-width:100%}

    /* Nav */
    .nav{background:var(--ink);padding:.9rem 0;position:sticky;top:0;z-index:100}
    .nav-inner{display:flex;align-items:center;justify-content:space-between;width:min(1200px,100% - 3rem);margin:auto;gap:1rem}
    .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:white;display:flex;align-items:center;gap:.5rem;text-decoration:none}
    .logo-mark{width:30px;height:30px;background:var(--brand);border-radius:8px;display:grid;place-items:center;flex-shrink:0}
    .logo-mark svg{width:16px;height:16px;fill:white}
    .nav-links{display:flex;gap:1.5rem;align-items:center}
    .nav-links a{color:rgba(255,255,255,.75);font-size:.88rem;font-weight:500;transition:color var(--trans)}
    .nav-links a:hover{color:white}
    .nav-links a.active{color:white;font-weight:600}
    .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1.2rem;border-radius:var(--r-full);font-size:.85rem;font-weight:600;transition:all var(--trans);cursor:pointer;border:none;font-family:inherit}
    .btn-primary{background:var(--brand);color:white}
    .btn-primary:hover{background:var(--brand-2)}
    .btn-ghost{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.15)}
    .btn-ghost:hover{background:rgba(255,255,255,.18);color:white}
    .btn-outline{border:1.5px solid var(--mist);color:var(--ink-3);background:none}
    .btn-outline:hover{border-color:var(--brand);color:var(--brand)}

    /* Hero */
    .hero{background:linear-gradient(135deg,#050c1f 0%,#0d2654 60%,#1a3a7a 100%);padding:5rem 0 4rem;text-align:center;color:white}
    .hero-label{display:inline-flex;align-items:center;gap:.5rem;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:var(--r-full);padding:.35rem 1rem;font-size:.78rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:1.5rem;color:rgba(255,255,255,.85)}
    .hero h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:800;line-height:1.15;margin-bottom:1rem}
    .hero p{font-size:1.1rem;color:rgba(255,255,255,.7);max-width:560px;margin:0 auto}

    /* Main */
    .main{width:min(1200px,100% - 3rem);margin:3rem auto 5rem}

    /* Filter bar */
    .filter-bar{display:flex;align-items:center;gap:.6rem;margin-bottom:2.5rem;flex-wrap:wrap}
    .filter-btn{padding:.45rem 1rem;border-radius:var(--r-full);border:1.5px solid var(--mist);background:var(--white);font-size:.82rem;font-weight:600;color:var(--steel);cursor:pointer;transition:all var(--trans);font-family:inherit}
    .filter-btn:hover{border-color:var(--brand);color:var(--brand)}
    .filter-btn.active{background:var(--brand);border-color:var(--brand);color:white}
    .filter-count{margin-left:auto;font-size:.82rem;color:var(--steel)}

    /* Blog grid */
    .blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
    .blog-card{background:var(--white);border-radius:var(--r3);overflow:hidden;border:1.5px solid var(--mist);transition:all var(--trans);display:flex;flex-direction:column;text-decoration:none;color:inherit}
    .blog-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md);border-color:rgba(0,82,204,.2)}
    .blog-img{height:180px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;flex-shrink:0}
    .blog-body{padding:1.4rem;flex:1;display:flex;flex-direction:column}
    .blog-cat{display:inline-block;padding:.2rem .7rem;background:rgba(0,82,204,.08);color:var(--brand);border-radius:var(--r-full);font-size:.72rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:.75rem;align-self:flex-start}
    .blog-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;line-height:1.4;margin-bottom:.6rem;color:var(--ink)}
    .blog-card:hover .blog-title{color:var(--brand)}
    .blog-excerpt{font-size:.83rem;color:var(--steel);line-height:1.65;margin-bottom:1rem;flex:1}
    .blog-footer{display:flex;align-items:center;justify-content:space-between;gap:.5rem;flex-wrap:wrap}
    .blog-date{font-size:.75rem;color:var(--steel)}
    .blog-read{font-size:.8rem;font-weight:600;color:var(--brand);flex-shrink:0}

    /* Featured (first card bigger) */
    .blog-card.featured{grid-column:span 2;flex-direction:row}
    .blog-card.featured .blog-img{width:260px;height:auto;flex-shrink:0;font-size:5rem;border-radius:0}
    .blog-card.featured .blog-title{font-size:1.2rem}
    .blog-card.featured .blog-excerpt{font-size:.87rem}
    @media(max-width:900px){.blog-card.featured{flex-direction:column;grid-column:span 1}.blog-card.featured .blog-img{width:100%;height:160px}}

    /* Load more */
    .load-more-wrap{text-align:center;margin-top:2.5rem}

    /* Empty */
    .empty{text-align:center;padding:5rem 1rem;color:var(--steel)}
    .empty-icon{font-size:3rem;margin-bottom:1rem}

    /* Skeleton */
    .skeleton{background:linear-gradient(90deg,var(--mist) 25%,#dde3f0 50%,var(--mist) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--r1)}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .skel-card{background:var(--white);border-radius:var(--r3);overflow:hidden;border:1.5px solid var(--mist)}
    .skel-img{height:180px}
    .skel-body{padding:1.4rem;display:flex;flex-direction:column;gap:.75rem}
    .skel-cat{height:22px;width:90px}
    .skel-title{height:18px;width:90%}
    .skel-title2{height:18px;width:70%}
    .skel-text{height:14px;width:100%}
    .skel-text2{height:14px;width:85%}
    .skel-text3{height:14px;width:60%}

    /* Footer */
    .footer{background:var(--ink);color:rgba(255,255,255,.6);padding:2.5rem 0;text-align:center;font-size:.85rem}
    .footer a{color:rgba(255,255,255,.6);margin:0 .75rem}
    .footer a:hover{color:white}
    .footer-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;color:white;margin-bottom:.5rem}

    @media(max-width:900px){.blog-grid{grid-template-columns:1fr 1fr}}
    @media(max-width:600px){.blog-grid{grid-template-columns:1fr}.nav-links{display:none}}
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
      TaIQ
    </a>
    <div class="nav-links">
      <a href="index.html#jobs">Find Jobs</a>
      <a href="index.html#industries">Industries</a>
      <a href="blog.html" class="active">Insights</a>
      <a href="index.html#about">About</a>
    </div>
    <div style="display:flex;gap:.6rem">
      <a href="index.html?openLogin=1" class="btn btn-ghost" style="font-size:.82rem">Sign In</a>
      <a href="index.html?openRegister=1" class="btn btn-primary" style="font-size:.82rem">Get Started</a>
    </div>
  </div>
</nav>

<div class="hero">
  <div class="hero-label">✨ Career Insights</div>
  <h1>Resources to Elevate<br>Your Career</h1>
  <p>Expert advice, industry trends, and hiring guides from our team of career specialists</p>
</div>

<div class="main">
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-cat="" onclick="setCategory('')">All</button>
    <button class="filter-btn" data-cat="Career Advice" onclick="setCategory('Career Advice')">Career Advice</button>
    <button class="filter-btn" data-cat="Industry Trends" onclick="setCategory('Industry Trends')">Industry Trends</button>
    <button class="filter-btn" data-cat="Hiring Guide" onclick="setCategory('Hiring Guide')">Hiring Guide</button>
    <button class="filter-btn" data-cat="Job Search" onclick="setCategory('Job Search')">Job Search</button>
    <button class="filter-btn" data-cat="Workplace" onclick="setCategory('Workplace')">Workplace</button>
    <span class="filter-count" id="filterCount"></span>
  </div>

  <div class="blog-grid" id="blogGrid">
    <!-- skeleton -->
    <div class="skel-card"><div class="skeleton skel-img"></div><div class="skel-body"><div class="skeleton skel-cat"></div><div class="skeleton skel-title"></div><div class="skeleton skel-title2"></div><div class="skeleton skel-text"></div><div class="skeleton skel-text2"></div><div class="skeleton skel-text3"></div></div></div>
    <div class="skel-card"><div class="skeleton skel-img"></div><div class="skel-body"><div class="skeleton skel-cat"></div><div class="skeleton skel-title"></div><div class="skeleton skel-title2"></div><div class="skeleton skel-text"></div><div class="skeleton skel-text2"></div><div class="skeleton skel-text3"></div></div></div>
    <div class="skel-card"><div class="skeleton skel-img"></div><div class="skel-body"><div class="skeleton skel-cat"></div><div class="skeleton skel-title"></div><div class="skeleton skel-title2"></div><div class="skeleton skel-text"></div><div class="skeleton skel-text2"></div><div class="skeleton skel-text3"></div></div></div>
  </div>

  <div class="load-more-wrap">
    <button class="btn btn-outline" id="loadMoreBtn" style="display:none;padding:.7rem 2.5rem" onclick="loadMore()">Load More Articles</button>
  </div>
</div>

<footer class="footer">
  <div class="footer-logo">TaIQ</div>
  <div style="margin-bottom:.75rem">
    <a href="index.html">Home</a>
    <a href="blog.html">Insights</a>
    <a href="privacy-policy.html">Privacy</a>
    <a href="terms-of-service.html">Terms</a>
  </div>
  <div>© 2025 TaIQ Inc. All rights reserved.</div>
</footer>

<script>
  const API = '/api/v1';
  const LIMIT = 9;
  const GRADIENTS = [
    'linear-gradient(135deg,#e0f2fe,#bae6fd)',
    'linear-gradient(135deg,#f0fdf4,#bbf7d0)',
    'linear-gradient(135deg,#fef9c3,#fde68a)',
    'linear-gradient(135deg,#fce7f3,#fbcfe8)',
    'linear-gradient(135deg,#ede9fe,#ddd6fe)',
    'linear-gradient(135deg,#ffedd5,#fed7aa)',
    'linear-gradient(135deg,#ecfeff,#a5f3fc)',
    'linear-gradient(135deg,#f0fdf4,#86efac)',
    'linear-gradient(135deg,#fff7ed,#fdba74)',
  ];

  let currentCategory = '';
  let currentPage = 1;
  let totalPosts = 0;
  let loadedPosts = [];

  function setCategory(cat) {
    currentCategory = cat;
    currentPage = 1;
    loadedPosts = [];
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === cat);
    });
    loadPosts(true);
  }

  async function loadPosts(reset = false) {
    if (reset) {
      const grid = document.getElementById('blogGrid');
      grid.innerHTML = `
        <div class="skel-card"><div class="skeleton skel-img"></div><div class="skel-body"><div class="skeleton skel-cat"></div><div class="skeleton skel-title"></div><div class="skeleton skel-title2"></div><div class="skeleton skel-text"></div><div class="skeleton skel-text2"></div></div></div>
        <div class="skel-card"><div class="skeleton skel-img"></div><div class="skel-body"><div class="skeleton skel-cat"></div><div class="skeleton skel-title"></div><div class="skeleton skel-title2"></div><div class="skeleton skel-text"></div><div class="skeleton skel-text2"></div></div></div>
        <div class="skel-card"><div class="skeleton skel-img"></div><div class="skel-body"><div class="skeleton skel-cat"></div><div class="skeleton skel-title"></div><div class="skeleton skel-title2"></div><div class="skeleton skel-text"></div><div class="skeleton skel-text2"></div></div></div>`;
      document.getElementById('loadMoreBtn').style.display = 'none';
    }

    try {
      const params = new URLSearchParams({ page: currentPage, limit: LIMIT });
      if (currentCategory) params.set('category', currentCategory);

      const [postsRes, countRes] = await Promise.all([
        fetch(`${API}/public/blog?${params}`),
        fetch(`${API}/public/blog/count${currentCategory ? '?category=' + encodeURIComponent(currentCategory) : ''}`),
      ]);

      const posts = postsRes.ok ? await postsRes.json() : [];
      const countData = countRes.ok ? await countRes.json() : { total: 0 };
      totalPosts = countData.total || 0;

      if (reset) loadedPosts = [];
      loadedPosts = [...loadedPosts, ...posts];

      renderPosts(reset);
      document.getElementById('filterCount').textContent = `${totalPosts} article${totalPosts !== 1 ? 's' : ''}`;

      const loadMoreBtn = document.getElementById('loadMoreBtn');
      loadMoreBtn.style.display = loadedPosts.length < totalPosts ? '' : 'none';
    } catch {
      document.getElementById('blogGrid').innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">😕</div><p>Failed to load articles. Please try again.</p></div>`;
    }
  }

  function renderPosts(reset) {
    const grid = document.getElementById('blogGrid');
    if (reset) grid.innerHTML = '';

    if (!loadedPosts.length) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📭</div><p>No articles in this category yet.</p></div>`;
      return;
    }

    const startIdx = reset ? 0 : loadedPosts.length - (loadedPosts.length - grid.children.length);
    const newPosts = reset ? loadedPosts : loadedPosts.slice(grid.children.length);

    newPosts.forEach((p, i) => {
      const globalIdx = reset ? i : grid.children.length + i;
      const isFeatured = globalIdx === 0 && !currentCategory;
      const date = p.published_at
        ? new Date(p.published_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })
        : '';
      const emoji = p.cover_emoji || '📝';
      const grad = GRADIENTS[globalIdx % GRADIENTS.length];
      const mins = p.reading_time_minutes ? `${p.reading_time_minutes} min read` : '';

      const card = document.createElement('a');
      card.href = `blog-post.html?slug=${encodeURIComponent(p.slug)}`;
      card.className = `blog-card${isFeatured ? ' featured' : ''}`;
      card.innerHTML = `
        <div class="blog-img" style="background:${grad}">${emoji}</div>
        <div class="blog-body">
          <span class="blog-cat">${p.category || 'Article'}</span>
          <h2 class="blog-title">${esc(p.title)}</h2>
          <p class="blog-excerpt">${esc(p.excerpt || '')}</p>
          <div class="blog-footer">
            <span class="blog-date">${date}${mins ? ' · ' + mins : ''}</span>
            <span class="blog-read">Read More →</span>
          </div>
        </div>`;
      grid.appendChild(card);
    });
  }

  function loadMore() {
    currentPage++;
    loadPosts(false);
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Handle ?category= in URL
  const urlCat = new URLSearchParams(location.search).get('category') || '';
  if (urlCat) {
    currentCategory = urlCat;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === urlCat);
    });
  }

  loadPosts(true);
</script>
</body>
</html>
