events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Rate limit zone
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # Docker's embedded DNS — re-resolve every 10 s.
    # Using variables in proxy_pass forces nginx to honour this TTL,
    # so a backend/frontend restart never leaves a stale IP cached.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        client_max_body_size 20M;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
        gzip_min_length 1000;

        # API requests → backend (variable forces DNS re-resolve)
        location /api/ {
            set $backend_host "backend:8000";
            proxy_pass http://$backend_host;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 90s;
            proxy_connect_timeout 10s;
            limit_req zone=api burst=20 nodelay;
        }

        # Uploaded files (resumes, etc.)
        location /uploads/ {
            alias /uploads/;
            add_header Content-Disposition "inline";
            add_header X-Content-Type-Options "nosniff";
            expires 1d;
        }

        # SEO: robots.txt and sitemap
        location = /robots.txt {
            set $frontend_host "frontend:80";
            proxy_pass http://$frontend_host;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=86400";
            add_header X-Robots-Tag "noindex" always;
        }

        location = /sitemap.xml {
            set $frontend_host "frontend:80";
            proxy_pass http://$frontend_host;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=3600";
            add_header Content-Type "application/xml";
        }

        # Static assets — long cache
        location ~* \.(css|js|woff2?|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
            set $frontend_host "frontend:80";
            proxy_pass http://$frontend_host;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # HTML pages — never cache so rebuilds are instant
        location ~* \.html$ {
            set $frontend_host "frontend:80";
            proxy_pass http://$frontend_host;
            proxy_set_header Host $host;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
            add_header X-Frame-Options "SAMEORIGIN";
            add_header X-Content-Type-Options "nosniff";
            add_header Referrer-Policy "strict-origin-when-cross-origin";
        }

        # Everything else → frontend
        location / {
            set $frontend_host "frontend:80";
            proxy_pass http://$frontend_host;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
            add_header X-Frame-Options "SAMEORIGIN";
            add_header X-Content-Type-Options "nosniff";
            add_header Referrer-Policy "strict-origin-when-cross-origin";
        }

        # Health check
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
