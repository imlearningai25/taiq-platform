#version: "3.9"

services:
    db:
        image: postgres:16-alpine
        container_name: taiq_db
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-taiq}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taiq_secret}
            POSTGRES_DB: ${POSTGRES_DB:-taiq_db}
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
        ports:
            - '5432:5432'
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-taiq} -d postgres']
            start_period: 10s
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - taiq_net

    redis:
        image: redis:7-alpine
        container_name: taiq_redis
        restart: unless-stopped
        ports:
            - '6379:6379'
        networks:
            - taiq_net

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        #container_name: taiq_backend
        restart: unless-stopped
        env_file: .env
        environment:
            DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-taiq}:${POSTGRES_PASSWORD:-taiq_secret}@db:5432/${POSTGRES_DB:-taiq_db}
            REDIS_URL: redis://redis:6379/0
            SECRET_KEY: ${SECRET_KEY:-supersecretkey_change_in_production}
            ENVIRONMENT: ${ENVIRONMENT:-development}
        volumes:
            - ./backend:/app
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_started
        networks:
            - taiq_net

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        container_name: taiq_frontend
        restart: unless-stopped
        networks:
            - taiq_net

    nginx:
        image: nginx:alpine
        container_name: taiq_nginx
        restart: unless-stopped
        ports:
            - '8090:80'
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
        depends_on:
            - backend
            - frontend
        networks:
            - taiq_net

volumes:
    postgres_data:

networks:
    taiq_net:
        driver: bridge
